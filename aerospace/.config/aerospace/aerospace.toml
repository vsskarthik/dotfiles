run = 'move-node-to-workspace P'

[[on-window-detected]]
if.app-id = 'com.install4j.8153-2964-2028-4488-3.23'
run = 'move-node-to-workspace P'

[[on-window-detected]]
if.app-id = 'tech.bitflex.parquetviewer'
run = 'move-node-to-workspace P'

[[on-window-detected]]
