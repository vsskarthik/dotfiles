# ── Terminal ──────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"          # true color
set -ga terminal-overrides ",*:RGB"
set -g extended-keys on                             # pass Shift/Ctrl/Alt combos through (Shift+Enter etc.)
set -ga terminal-overrides ",*:extkeys"
set -g allow-passthrough on                         # let OSC/DCS sequences reach the terminal

# ── Core behavior ─────────────────────────────────────────────
set -g escape-time 0                                # no Esc delay (critical for nvim)
set -g repeat-time 600
set -g focus-events on                              # vim autoread / FocusGained
set -g history-limit 50000
set -g mouse on

# ── Indexing ──────────────────────────────────────────────────
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ── Prefix: Ctrl+Space ───────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Config reload ─────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# ── Session list ──────────────────────────────────────────────
bind Tab choose-tree -s

# ── Splits (open in same directory) ───────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation (vim-style) ───────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resize ───────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode (vi) ────────────────────────────────────────────
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ── Status bar ────────────────────────────────────────────────
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left-length 40
set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#45475a]│ "

set -g status-right-length 60
set -g status-right "#[fg=#45475a]│ #[fg=#a6e3a1]%H:%M #[fg=#45475a]│ #[fg=#89dceb]%d %b"

set -g window-status-format "#[fg=#6c7086] #I:#W "
set -g window-status-current-format "#[fg=#cdd6f4,bold] #I:#W "

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

set -g message-style "bg=#313244,fg=#cdd6f4"

# ── Plugins ───────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'           # auto-restore last saved session on tmux start
set -g @resurrect-capture-pane-contents 'on'

run '~/.tmux/plugins/tpm/tpm'
